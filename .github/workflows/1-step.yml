name: Step 1 - Configurar Figma MCP

on:
  push:
    branches:
      - main
    paths:
      - ".vscode/mcp.json"

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  find_exercise:
    if: ${{ !github.event.repository.is_template }}
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.9.1

  check_file:
    name: Check mcp.json exists
    needs: [find_exercise]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check file exists
        uses: skills/exercise-toolkit/actions/file-exists@v0.9.1
        with:
          file: .vscode/mcp.json

  check_keyphrase:
    name: Check MCP configuration
    needs: [find_exercise, check_file]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Figma MCP URL
        uses: skills/action-keyphrase-checker@v1
        with:
          text-file: .vscode/mcp.json
          keyphrase: "mcp.figma.com"

  post_next_step:
    name: Post Step 2 Instructions
    needs: [find_exercise, check_keyphrase]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post comment
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ needs.find_exercise.outputs.issue-number }}
          file: .github/steps/2-step.md

  finish:
    name: Enable Next Step
    needs: [find_exercise, post_next_step]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Disable current workflow
        run: gh workflow disable "Step 1 - Configurar Figma MCP" --repo "${{ github.repository }}"
      - name: Enable next workflow
        run: gh workflow enable "Step 2 - Extrair Design Tokens" --repo "${{ github.repository }}"
